// Hook générique pour appels API avec état loading/error
function useApi(fn, deps=[]) {
  const [data,    setData]    = useState(null);
  const [loading, setLoading] = useState(true);
  const [error,   setError]   = useState(null);
  const refresh = useCallback(async () => {
    setLoading(true); setError(null);
    try { const res = await fn(); if(res.success) setData(res.data); else setError(res.error); }
    catch(e) { setError(e.message); }
    finally { setLoading(false); }
  }, deps);
  useEffect(() => { refresh(); }, [refresh]);
  return { data, loading, error, refresh };
}

    case"REMOVE":return s.filter(i=>i.id!==a.id);
    case"QTY":return s.map(i=>i.id===a.id?{...i,qty:Math.min(Math.max(1,a.qty),i.stock??99)}:i);
    case"CLEAR":return[];
    default:return s;
  }
}
function CartProvider({children}){
  const[items,dispatch]=useReducer(cartReducer,[]);
  const total=items.reduce((s,i)=>s+i.price*i.qty,0);
  const count=items.reduce((s,i)=>s+i.qty,0);
  return <CartCtx.Provider value={{items,total,count,dispatch}}>{children}</CartCtx.Provider>;
}
const useCart=()=>useContext(CartCtx);

const WishCtx=createContext(null);
function WishProvider({children}){
  const[ids,setIds]=useState(new Set());
  const toggle=useCallback(id=>setIds(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;}),[]);
  return <WishCtx.Provider value={{ids,toggle,count:ids.size}}>{children}</WishCtx.Provider>;
}
const useWish=()=>useContext(WishCtx);

const ToastCtx=createContext(null);
function ToastProvider({children}){
  const[toasts,setToasts]=useState([]);
  const push=useCallback((msg,type="success")=>{
    const id=Date.now();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),2800);
  },[]);
  return(
    <ToastCtx.Provider value={{push}}>
      {children}
      <div style={{position:"fixed",bottom:80,left:"50%",transform:"translateX(-50%)",zIndex:9999,display:"flex",flexDirection:"column",alignItems:"center",gap:8,pointerEvents:"none"}}>
        {toasts.map(t=>(
          <div key={t.id} className="toast-in" style={{
            padding:"10px 18px",borderRadius:12,color:"#fff",fontSize:12,fontWeight:700,
            display:"flex",alignItems:"center",gap:8,boxShadow:"0 8px 24px rgba(0,0,0,.2)",
            background:t.type==="error"?"#ef4444":t.type==="warn"?"#f59e0b":"#10b981"
          }}>
            {t.type==="error"?"✕":t.type==="warn"?"⚠":"✓"} {t.msg}
          </div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}
const useToast=()=>useContext(ToastCtx);

function ProductCard({p,go}){

  const disc=p.orig?Math.round((1-p.price/p.orig)*100):0;

    if(oos)return;
    dispatch({type:"ADD",p});

    setTimeout(()=>setAdded(false),1400);

    <div className="card" style={{background:"#fff",borderRadius:16,overflow:"hidden",border:"1px solid #f1f5f9",boxShadow:"0 1px 4px rgba(0,0,0,.06)",display:"flex",flexDirection:"column",transition:"all .25s ease",cursor:"default"}}>

// ── CATALOG ──
function Catalog({go,initCat,q,products=PRODS,categories=CATS}){
  const[cat,setCat]=useState(initCat||"Tous");
  const[sort,setSort]=useState("popular");
  const[budget,setBudget]=useState([0,1000000]);
  const[vis,setVis]=useState(12);

  useEffect(()=>{if(initCat)setCat(initCat);},[initCat]);

  const list=useMemo(()=>products.filter(p=>{
    const catOk=cat==="Tous"||p.cat===cat;
    const priceOk=p.price>=budget[0]&&p.price<=budget[1];
    const qOk=!q.trim()||p.name.toLowerCase().includes(q.toLowerCase())||p.cat.toLowerCase().includes(q.toLowerCase());
    return catOk&&priceOk&&qOk;
  }).sort((a,b)=>sort==="price_asc"?a.price-b.price:sort==="price_desc"?b.price-a.price:sort==="rating"?b.rating-a.rating:b.rev-a.rev),[cat,sort,budget,q]);

  return(
    <div style={{maxWidth:1280,margin:"0 auto",padding:"20px 16px 40px"}}>
      <div style={{fontSize:11,color:"#94a3b8",marginBottom:16,display:"flex",alignItems:"center",gap:6}}>
        <button onClick={()=>go("home")} style={{border:"none",background:"none",cursor:"pointer",color:"#94a3b8",fontSize:11}} onMouseEnter={e=>e.currentTarget.style.color=BLUE} onMouseLeave={e=>e.currentTarget.style.color="#94a3b8"}>Accueil</button>
        <span>›</span><span style={{color:"#1e293b",fontWeight:600}}>Catalogue</span>
        {q&&<><span>›</span><span style={{color:BLUE,fontWeight:600}}>"{q}"</span></>}
      </div>

      <div style={{display:"flex",gap:20,alignItems:"flex-start"}}>
        {/* Sidebar */}
        <aside style={{width:210,flexShrink:0}} className="hide-mobile">
          <div style={{background:"#fff",borderRadius:16,border:"1px solid #f1f5f9",padding:16,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
            <p style={{fontSize:10,fontWeight:800,color:"#94a3b8",textTransform:"uppercase",letterSpacing:.1,marginBottom:8}}>Catégories</p>
            {["Tous",...categories.map(c=>c.name)].map(c=>(
              <button key={c} onClick={()=>setCat(c)} style={{
                display:"block",width:"100%",textAlign:"left",padding:"7px 12px",borderRadius:10,border:"none",
                background:cat===c?BLUE:"transparent",color:cat===c?"#fff":"#475569",
                fontSize:12,fontWeight:cat===c?700:500,cursor:"pointer",marginBottom:2,
                fontFamily:"'Sora',sans-serif",transition:"all .15s"
              }}>{c}</button>
            ))}
            <p style={{fontSize:10,fontWeight:800,color:"#94a3b8",textTransform:"uppercase",letterSpacing:.1,margin:"16px 0 8px"}}>Trier par</p>
            <select value={sort} onChange={e=>setSort(e.target.value)} style={{width:"100%",padding:"8px 10px",borderRadius:10,border:"1px solid #e2e8f0",fontSize:12,background:"#fff",fontFamily:"'Sora',sans-serif"}}>
              <option value="popular">Plus populaires</option>
              <option value="rating">Mieux notés</option>
              <option value="price_asc">Prix croissant</option>
              <option value="price_desc">Prix décroissant</option>
            </select>
            <p style={{fontSize:10,fontWeight:800,color:"#94a3b8",textTransform:"uppercase",letterSpacing:.1,margin:"16px 0 8px"}}>Budget</p>
            {[[0,100000,"< 100K"],[100000,300000,"100K–300K"],[300000,600000,"300K–600K"],[600000,1000000,"> 600K"]].map(([mn,mx,lb])=>(
              <button key={lb} onClick={()=>setBudget([mn,mx])} style={{
                display:"block",width:"100%",textAlign:"left",padding:"6px 12px",borderRadius:10,border:"none",
                background:budget[0]===mn&&budget[1]===mx?"#eff6ff":"transparent",
                color:budget[0]===mn&&budget[1]===mx?BLUE:"#475569",
                fontSize:12,fontWeight:budget[0]===mn&&budget[1]===mx?700:500,cursor:"pointer",marginBottom:2,
                fontFamily:"'Sora',sans-serif"
              }}>{lb}</button>
            ))}
            {(cat!=="Tous"||budget[0]!==0||budget[1]!==1000000)&&(
              <button onClick={()=>{setCat("Tous");setBudget([0,1000000]);}} style={{width:"100%",marginTop:12,padding:"7px 12px",borderRadius:10,border:"1px solid #e2e8f0",background:"none",fontSize:11,color:"#94a3b8",cursor:"pointer",fontFamily:"'Sora',sans-serif"}}>
                ✕ Effacer les filtres
              </button>
            )}
          </div>
        </aside>

        {/* Grid */}
        <div style={{flex:1}}>
          <p style={{fontSize:12,color:"#94a3b8",marginBottom:14}}>
            <strong style={{color:"#1e293b"}}>{list.length}</strong> produit{list.length!==1?"s":""} trouvé{list.length!==1?"s":""}
          </p>
          {list.length===0?(
            <div style={{textAlign:"center",padding:"60px 20px",color:"#94a3b8"}}>
              <p style={{fontSize:40,marginBottom:12,opacity:.3}}>📦</p>
              <p style={{fontWeight:700,color:"#64748b",marginBottom:8}}>Aucun produit trouvé</p>
              <button onClick={()=>{setCat("Tous");setBudget([0,1000000]);}} style={{fontSize:12,color:BLUE,border:"none",background:"none",cursor:"pointer",textDecoration:"underline"}}>Effacer les filtres</button>
            </div>
          ):(
            <>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:14,marginBottom:20}}>
                {list.slice(0,vis).map(p=><ProductCard key={p.id} p={p} go={go}/>)}
              </div>
              {vis<list.length&&(
                <div style={{textAlign:"center",marginTop:8}}>
                  <button onClick={()=>setVis(v=>v+8)} style={{padding:"10px 28px",borderRadius:12,border:`2px solid ${BLUE}`,background:"none",color:BLUE,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"'Sora',sans-serif",transition:"all .2s"}}
                    onMouseEnter={e=>{e.currentTarget.style.background=BLUE;e.currentTarget.style.color="#fff";}}
                    onMouseLeave={e=>{e.currentTarget.style.background="none";e.currentTarget.style.color=BLUE;}}>
                    Voir plus ({list.length-vis} restants)
                  </button>
                </div>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ── PRODUCT PAGE ──
function ProductPage({p,go,allProducts=PRODS}){
  const{dispatch}=useCart();
  const{ids,toggle}=useWish();
  const{push}=useToast();
  const[qty,setQty]=useState(1);
  const[added,setAdded]=useState(false);
  const liked=ids.has(p.id);
  const disc=p.orig?Math.round((1-p.price/p.orig)*100):0;
  const max=p.stock??99;

  useEffect(()=>{setQty(1);setAdded(false);},[p.id]);

  const related=allProducts.filter(x=>x.cat===p.cat&&x.id!==p.id).slice(0,4);

  const add=()=>{
    for(let i=0;i<qty;i++)dispatch({type:"ADD",p});
    push(`${p.name.slice(0,20)}... ajouté au panier !`);
    setAdded(true);setTimeout(()=>setAdded(false),2000);
  };

  return(
    <div style={{maxWidth:1280,margin:"0 auto",padding:"20px 16px 40px"}}>
      <div style={{fontSize:11,color:"#94a3b8",marginBottom:20,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
        <button onClick={()=>go("home")} style={{border:"none",background:"none",cursor:"pointer",color:"#94a3b8",fontSize:11}}>Accueil</button>
        <span>›</span>
        <button onClick={()=>go("catalog",{cat:p.cat})} style={{border:"none",background:"none",cursor:"pointer",color:"#94a3b8",fontSize:11}}>{p.cat}</button>
        <span>›</span>
        <span style={{color:"#1e293b",fontWeight:600}}>{p.name}</span>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:32,marginBottom:40}} className="md:grid-cols-2">
        {/* Image */}
        <div>
          <div style={{borderRadius:24,overflow:"hidden",aspectRatio:"1",background:"#f8fafc",position:"relative"}}>
            <SafeImg src={p.img} alt={p.name} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
            {disc>0&&<span style={{position:"absolute",top:16,left:16,padding:"4px 12px",borderRadius:99,background:"#ef4444",color:"#fff",fontSize:12,fontWeight:800}}>-{disc}%</span>}
          </div>
        </div>

        {/* Info */}
        <div>
          <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
            <span style={{fontSize:10,fontWeight:800,textTransform:"uppercase",letterSpacing:.08,color:BLUE,background:"#eff6ff",padding:"3px 10px",borderRadius:99}}>{p.cat}</span>
            {p.badge&&<span style={{fontSize:10,fontWeight:800,background:"#fef3c7",color:"#b45309",padding:"3px 10px",borderRadius:99}}>{p.badge}</span>}
          </div>
          <h1 style={{fontSize:"clamp(18px,3vw,26px)",fontWeight:900,color:"#0f172a",lineHeight:1.25,marginBottom:12}}>{p.name}</h1>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
            <Stars rating={p.rating} size={14}/>
            <span style={{fontWeight:700,fontSize:13,color:"#334155"}}>{p.rating}</span>
            <span style={{fontSize:12,color:"#94a3b8"}}>({p.rev} avis)</span>
          </div>
          <div style={{display:"flex",alignItems:"flex-end",gap:10,marginBottom:14}}>
            <span style={{fontSize:30,fontWeight:900,color:BLUE}}>{fmt(p.price)}</span>
            {p.orig&&<span style={{fontSize:14,color:"#94a3b8",textDecoration:"line-through",marginBottom:4}}>{fmt(p.orig)}</span>}
          </div>
          <p style={{fontSize:13,color:"#475569",lineHeight:1.7,marginBottom:16}}>{p.desc}</p>
          {p.specs&&(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:16}}>
              {p.specs.map((s,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:6,background:"#f8fafc",borderRadius:10,padding:"7px 10px",fontSize:11,fontWeight:600,color:"#334155"}}>
                  <span style={{color:BLUE,fontSize:12}}>✓</span>{s}
                </div>
              ))}
            </div>
          )}
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:16,fontSize:12,fontWeight:600,color:max>5?"#047857":max>0?"#b45309":"#dc2626"}}>
            <span style={{width:8,height:8,borderRadius:"50%",background:max>5?"#10b981":max>0?"#f59e0b":"#ef4444",display:"inline-block"}}/>
            {max>5?"En stock":max>0?`⚠ Plus que ${max} en stock`:"Rupture de stock"}
          </div>
          {max>0&&(
            <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:16}}>
              <div style={{display:"flex",alignItems:"center",border:"1px solid #e2e8f0",borderRadius:12,overflow:"hidden"}}>
                <button onClick={()=>setQty(q=>Math.max(1,q-1))} style={{width:38,height:44,border:"none",background:"none",cursor:"pointer",fontSize:16,fontWeight:700}}>−</button>
                <span style={{width:40,textAlign:"center",fontWeight:800,fontSize:14}}>{qty}</span>
                <button onClick={()=>setQty(q=>Math.min(q+1,max))} disabled={qty>=max} style={{width:38,height:44,border:"none",background:"none",cursor:qty>=max?"not-allowed":"pointer",fontSize:16,fontWeight:700,opacity:qty>=max?.4:1}}>+</button>
              </div>
              <button onClick={add} style={{flex:1,padding:"12px 16px",borderRadius:12,border:"none",cursor:"pointer",fontWeight:700,fontSize:13,
                background:added?"#10b981":grad,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",gap:8,fontFamily:"'Sora',sans-serif",transition:"background .2s"}}>
                {added?"✓ Ajouté au panier !":"🛒 Ajouter au panier"}
              </button>
              <button onClick={()=>{toggle(p.id);push(liked?"Retiré des favoris":"Ajouté aux favoris 💛");}} style={{width:44,height:44,borderRadius:12,border:`2px solid ${liked?"#fca5a5":"#e2e8f0"}`,background:liked?"#fef2f2":"none",cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>
                {liked?"❤️":"🤍"}
              </button>
            </div>
          )}
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
            {[["🚚","Livraison 24-48h"],["🔒","Garanti Officiel"],["🔄","Retour 7 jours"]].map(([ic,t],i)=>(
              <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,background:"#f8fafc",borderRadius:12,padding:10,textAlign:"center"}}>
                <span style={{fontSize:18}}>{ic}</span>
                <span style={{fontSize:10,color:"#475569",fontWeight:600,lineHeight:1.3}}>{t}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {related.length>0&&(
        <section>
          <h2 style={{fontSize:18,fontWeight:900,color:"#0f172a",marginBottom:14}}>Produits similaires</h2>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:14}}>
            {related.map(rp=><ProductCard key={rp.id} p={rp} go={go}/>)}
          </div>
        </section>
      )}
    </div>
  );
}

// ── CHECKOUT ──
function Checkout({go}){
  const{items,total,dispatch}=useCart();
  const{push}=useToast();
  const[step,setStep]=useState(1);
  const[pay,setPay]=useState("cod");
  const[form,setForm]=useState({prenom:"",nom:"",telephone:"",adresse:"",quartier:"",ville:"Dakar"});
  const[err,setErr]=useState({});
  const[done,setDone]=useState(false);
  const[submitting,setSubmitting]=useState(false);
  const orderId=useRef(null); // sera rempli par la réponse Odoo
  const VILLES=["Dakar","Thiès","Saint-Louis","Kaolack","Ziguinchor","Tambacounda","Louga","Fatick"];

  const inp=e=>{setForm(f=>({...f,[e.target.name]:e.target.value}));setErr(er=>({...er,[e.target.name]:""}));};

  const validate=()=>{
    const e={};
    if(!form.prenom.trim())e.prenom="Requis";
    if(!form.nom.trim())e.nom="Requis";
    if(!/^\d{9}$/.test(form.telephone.replace(/\s/g,"")))e.telephone="9 chiffres requis";
    if(!form.adresse.trim())e.adresse="Requise";
    if(!form.quartier.trim())e.quartier="Requis";
    setErr(e);
    if(Object.keys(e).length){push("Veuillez corriger les erreurs","error");return false;}
    return true;
  };

  const Field=({name,label,ph})=>(
    <div>
      <label style={{display:"block",fontSize:10,fontWeight:800,color:"#94a3b8",marginBottom:4,textTransform:"uppercase",letterSpacing:.08}}>{label}</label>
      <input name={name} value={form[name]} onChange={inp} placeholder={ph}
        style={{width:"100%",padding:"10px 12px",borderRadius:10,border:`1px solid ${err[name]?"#fca5a5":"#e2e8f0"}`,fontSize:13,fontFamily:"'Sora',sans-serif",background:err[name]?"#fff5f5":"#fff"}}/>
      {err[name]&&<p style={{fontSize:10,color:"#ef4444",marginTop:3}}>{err[name]}</p>}
    </div>
  );

  if(!done&&items.length===0)return(
    <div style={{minHeight:"60vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center"}}>
        <p style={{fontSize:48,marginBottom:12,opacity:.3}}>🛒</p>
        <p style={{fontWeight:700,color:"#64748b",marginBottom:16}}>Votre panier est vide</p>
        <Btn onClick={()=>go("catalog")}>Voir les produits</Btn>
      </div>
    </div>
  );

  if(done)return(
    <div style={{minHeight:"70vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{maxWidth:380,width:"100%",textAlign:"center"}}>
        <div style={{width:72,height:72,borderRadius:"50%",background:"#10b981",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px",fontSize:36,boxShadow:"0 8px 24px rgba(16,185,129,.3)"}}>✓</div>
        <h2 style={{fontSize:24,fontWeight:900,color:"#0f172a",marginBottom:10}}>Commande confirmée ! 🎉</h2>
        <p style={{fontSize:13,color:"#64748b",lineHeight:1.6,marginBottom:20}}>Merci <strong>{form.prenom}</strong> ! Vous recevrez un SMS de confirmation au <strong>+221 {form.telephone}</strong>.</p>
        <div style={{background:"#eff6ff",borderRadius:16,padding:16,textAlign:"left",marginBottom:20}}>
          <p style={{fontSize:14,fontWeight:900,color:DARK_BLUE,marginBottom:8}}>
            {orderId.current ? `Réf Odoo : ${orderId.current}` : "Commande enregistrée"}
          </p>
          {[["Livraison estimée","24–48 heures"],["Adresse",`${form.quartier}, ${form.ville}`],["Paiement",pay==="cod"?"À la livraison":"Mobile Money"]].map(([k,v])=>(
            <p key={k} style={{fontSize:12,color:"#2563eb",marginBottom:4}}>{k} : <strong>{v}</strong></p>
          ))}
        </div>
        <Btn onClick={()=>go("home")} style={{width:"100%",borderRadius:12}}>Retour à l'accueil →</Btn>
      </div>
    </div>
  );

  return(
    <div style={{maxWidth:900,margin:"0 auto",padding:"20px 16px 40px"}}>
      <button onClick={()=>go("catalog")} style={{border:"none",background:"none",cursor:"pointer",color:"#94a3b8",fontSize:12,marginBottom:16,display:"flex",alignItems:"center",gap:4}}>← Retour au catalogue</button>
      <h1 style={{fontSize:22,fontWeight:900,color:"#0f172a",marginBottom:20}}>Finaliser la commande</h1>

      {/* Steps */}
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:24}}>
        {[{n:1,l:"Livraison"},{n:2,l:"Paiement"},{n:3,l:"Confirmation"}].map((s,i)=>(
          <React.Fragment key={s.n}>
            <div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 14px",borderRadius:99,fontSize:11,fontWeight:700,
              background:step>=s.n?BLUE:"#f1f5f9",color:step>=s.n?"#fff":"#94a3b8",transition:"all .2s"}}>
              <span style={{width:18,height:18,borderRadius:"50%",background:"rgba(255,255,255,.25)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10}}>
                {step>s.n?"✓":s.n}
              </span>
              {s.l}
            </div>
            {i<2&&<div style={{flex:1,maxWidth:30,height:2,background:step>s.n?BLUE:"#e2e8f0",transition:"background .2s"}}/>}
          </React.Fragment>
        ))}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:20,alignItems:"start"}}>
        <div>
          {/* Step 1 */}
          {step===1&&(
            <div style={{background:"#fff",borderRadius:20,border:"1px solid #f1f5f9",padding:24,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
              <h2 style={{fontSize:15,fontWeight:800,color:"#0f172a",marginBottom:20,display:"flex",alignItems:"center",gap:8}}>📍 Infos de livraison</h2>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>

                <button onClick={()=>setStep(1)} style={{padding:"10px 16px",borderRadius:10,border:"1px solid #e2e8f0",background:"none",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'Sora',sans-serif"}}>← Retour</button>
                <Btn onClick={()=>setStep(3)} style={{flex:1,borderRadius:12}}>Vérifier la commande →</Btn>
              </div>
            </div>
          )}

          {/* Step 3 */}
          {step===3&&(
            <div style={{background:"#fff",borderRadius:20,border:"1px solid #f1f5f9",padding:24,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
              <h2 style={{fontSize:15,fontWeight:800,color:"#0f172a",marginBottom:16}}>📋 Récapitulatif final</h2>
              <div style={{background:"#f8fafc",borderRadius:12,padding:12,marginBottom:16}}>
                {[["Client",`${form.prenom} ${form.nom}`],["Téléphone",`+221 ${form.telephone}`],["Livraison",`${form.adresse}, ${form.quartier}, ${form.ville}`],["Paiement",pay==="cod"?"À la livraison":"Mobile Money"]].map(([k,v])=>(
                  <div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:12}}>
                    <span style={{color:"#94a3b8"}}>{k}</span>
                    <span style={{fontWeight:600,textAlign:"right",maxWidth:"60%"}}>{v}</span>
                  </div>
                ))}
              </div>
              <div style={{maxHeight:180,overflowY:"auto",marginBottom:16}}>
                {items.map(item=>(
                  <div key={item.id} style={{display:"flex",gap:10,alignItems:"center",marginBottom:10}}>
                    <SafeImg src={item.img} alt={item.name} style={{width:36,height:36,borderRadius:8,objectFit:"cover",flexShrink:0}}/>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{fontSize:11,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}</p>

              </div>
              <div style={{borderTop:"1px solid #f1f5f9",paddingTop:12,marginBottom:16}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#94a3b8",marginBottom:6}}>
                  <span>Livraison</span><span style={{color:"#059669",fontWeight:700}}>Gratuite 🎉</span>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",fontWeight:900,fontSize:15}}>
                  <span>Total à payer</span><span style={{color:BLUE}}>{fmt(total)}</span>

              </div>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setStep(2)} style={{padding:"10px 16px",borderRadius:10,border:"1px solid #e2e8f0",background:"none",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'Sora',sans-serif"}}>← Retour</button>
                <button onClick={async()=>{
                    setSubmitting(true);
                    try{
                      const res=await api.createOrder({
                        delivery:form,
                        items:items.map(i=>({id:i.id,name:i.name,price:i.price,qty:i.qty})),
                        payMethod:pay,
                      });
                      if(res.success){
                        orderId.current=res.data.orderName;
                        dispatch({type:"CLEAR"});
                        setDone(true);
                        push("Commande confirmée ! 🎉");
                      } else {
                        push(res.error||"Erreur lors de la commande","error");
                      }
                    }catch(e){push("Erreur réseau : "+e.message,"error");}
                    finally{setSubmitting(false);}
                  }}
                  disabled={submitting}
                  style={{flex:1,padding:"13px 20px",borderRadius:12,border:"none",
                    background:submitting?"#94a3b8":"#10b981",
                    color:"#fff",fontWeight:800,fontSize:13,cursor:submitting?"not-allowed":"pointer",
                    fontFamily:"'Sora',sans-serif",boxShadow:submitting?"none":"0 4px 16px rgba(16,185,129,.35)",
                    display:"flex",alignItems:"center",justifyContent:"center",gap:8,transition:"all .2s"}}>

                </button>
              </div>
            </div>
          )}
        </div>

        {/* Summary sidebar */}
        <div style={{width:240,flexShrink:0}} className="hide-mobile">
          <div style={{background:"#fff",borderRadius:16,border:"1px solid #f1f5f9",padding:16,marginBottom:12,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
            <p style={{fontWeight:800,fontSize:13,marginBottom:12}}>Votre commande</p>
            <div style={{maxHeight:180,overflowY:"auto",marginBottom:12}}>
              {items.map(item=>(
                <div key={item.id} style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
                  <SafeImg src={item.img} alt={item.name} style={{width:32,height:32,borderRadius:8,objectFit:"cover",flexShrink:0}}/>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{fontSize:10,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}</p>
                    <p style={{fontSize:10,color:"#94a3b8"}}>×{item.qty}</p>
                  </div>
                  <p style={{fontSize:10,fontWeight:800,color:BLUE,flexShrink:0}}>{fmt(item.price*item.qty)}</p>
                </div>
              ))}
            </div>
            <div style={{borderTop:"1px solid #f1f5f9",paddingTop:10}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#94a3b8",marginBottom:4}}>
                <span>Livraison</span><span style={{color:"#059669",fontWeight:700}}>Gratuite</span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontWeight:900,fontSize:14}}>
                <span>Total</span><span style={{color:BLUE}}>{fmt(total)}</span>
              </div>
            </div>
          </div>
          <div style={{background:"#eff6ff",borderRadius:14,padding:12}}>
            {[["🔒","Paiement sécurisé"],["🚚","Livraison 24-48h"],["📞","Support 7j/7"]].map(([ic,t])=>(
              <p key={t} style={{fontSize:11,color:"#1d4ed8",display:"flex",alignItems:"center",gap:6,marginBottom:4,fontWeight:600}}><span>{ic}</span>{t}</p>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── ADMIN ──
function Admin({onExit}){
  const[tab,setTab]=useState("dash");
  const[orders,setOrders]=useState(INIT_ORDERS);
  const[prods,setProds]=useState(PRODS);
  const[showAdd,setShowAdd]=useState(false);
  const[np,setNp]=useState({name:"",cat:"Smartphones",price:"",orig:"",stock:"",desc:""});
  const[npErr,setNpErr]=useState({});
  const[odooStatus,setOdooStatus]=useState("checking"); // checking | ok | error
  const[loadingProds,setLoadingProds]=useState(false);
  const[loadingOrders,setLoadingOrders]=useState(false);
  const{push}=useToast();

  // ── Vérification connexion Odoo au démarrage ──
  useEffect(()=>{
    (async()=>{
      const h=await api.healthCheck();
      setOdooStatus(h.status==="ok"?"ok":"error");
    })();
  },[]);

  // ── Chargement produits depuis Odoo ──
  const loadProducts=useCallback(async()=>{
    setLoadingProds(true);
    try{
      const res=await api.getProducts();
      if(res.success&&res.data) setProds(res.data);
      else push("Impossible de charger les produits Odoo","warn");
    }catch(e){push("Erreur produits: "+e.message,"error");}
    finally{setLoadingProds(false);}
  },[]);

  // ── Chargement commandes depuis Odoo ──
  const loadOrders=useCallback(async()=>{
    setLoadingOrders(true);
    try{
      const res=await api.getOrders();
      if(res.success&&res.data) setOrders(res.data);
      else push("Impossible de charger les commandes Odoo","warn");
    }catch(e){push("Erreur commandes: "+e.message,"error");}
    finally{setLoadingOrders(false);}
  },[]);

  useEffect(()=>{ loadProducts(); loadOrders(); },[]);

  // ── Changement statut commande via Odoo ──
  const changeOrderStatus=async(orderId,odooId,newState)=>{
    const statusMap={"En attente":"draft","En transit":"sale","Livré":"done","Annulé":"cancel"};
    try{
      await api.updateOrderStatus(odooId,statusMap[newState]||newState);
      setOrders(or=>or.map(x=>(x.id===orderId||x.odooId===odooId)?{...x,status:newState}:x));
      push(`Commande mise à jour → ${newState}`);
    }catch(e){
      // Si pas d'ID Odoo (mode démo), on met à jour localement quand même
      setOrders(or=>or.map(x=>x.id===orderId?{...x,status:newState}:x));
      push(`Statut: ${newState}`);
    }
  };

  const stats=[
    {l:"Chiffre d'affaires",v:fmt(orders.filter(o=>o.status==="Livré").reduce((s,o)=>s+(o.total||0),0)||4850000),ch:"+12%",bg:"#eff6ff",c:BLUE,ic:"📊"},
    {l:"Commandes",          v:orders.length,   ch:"+8%", bg:"#f0fdf4",c:"#059669",ic:"🛍"},
    {l:"Produits actifs",    v:prods.length,    ch:"+3",  bg:"#fffbeb",c:"#d97706",ic:"📦"},
    {l:"Clients",            v:new Set(orders.map(o=>o.customer)).size||892,ch:"+24",bg:"#f5f3ff",c:"#7c3aed",ic:"👥"},
  ];
  const TABS={dash:"Tableau de bord",products:"Produits",orders:"Commandes",customers:"Clients",analytics:"Statistiques",settings:"Paramètres"};

  const saveProduct=()=>{
    const e={};
    if(!np.name.trim())e.name="Requis";
    if(!np.price||isNaN(+np.price)||+np.price<=0)e.price="Prix invalide";
    setNpErr(e);
    if(Object.keys(e).length){push("Corriger les erreurs","error");return;}
    setProds(p=>[{id:Date.now(),name:np.name,cat:np.cat,price:+np.price,orig:np.orig?+np.orig:null,stock:+np.stock||0,rating:0,rev:0,img:PLACEHOLDER,badge:"Nouveau",desc:np.desc,specs:[]},...p]);
    setNp({name:"",cat:"Smartphones",price:"",orig:"",stock:"",desc:""});
    setNpErr({});setShowAdd(false);push("Produit ajouté !");
  };

  const NavBtn=({id,ic,label})=>(
    <button onClick={()=>setTab(id)} style={{
      display:"flex",alignItems:"center",gap:8,width:"100%",padding:"9px 12px",borderRadius:10,border:"none",
      background:tab===id?grad:"transparent",color:tab===id?"#fff":"#64748b",
      fontSize:12,fontWeight:tab===id?700:500,cursor:"pointer",fontFamily:"'Sora',sans-serif",marginBottom:2,transition:"all .15s"
    }}><span>{ic}</span>{label}</button>
  );

  return(
    <div style={{display:"flex",height:"100vh",background:"#f8fafc",overflow:"hidden",fontFamily:"'Sora',sans-serif"}}>
      {/* Sidebar */}
      <aside style={{width:210,background:"#fff",borderRight:"1px solid #f1f5f9",display:"flex",flexDirection:"column",flexShrink:0}}>
        <div style={{padding:"16px 14px",borderBottom:"1px solid #f1f5f9",display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:32,height:32,borderRadius:10,background:grad,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>🛍</div>
          <div><p style={{fontWeight:900,fontSize:11,color:"#0f172a"}}>Kumpax Store</p><p style={{fontSize:10,color:"#94a3b8"}}>Administration</p></div>
        </div>
        <nav style={{flex:1,padding:12}}>
          <NavBtn id="dash"      ic="📊" label="Tableau de bord"/>
          <NavBtn id="products"  ic="📦" label="Produits"/>
          <NavBtn id="orders"    ic="🛍" label="Commandes"/>
          <NavBtn id="customers" ic="👥" label="Clients"/>
          <NavBtn id="analytics" ic="📈" label="Statistiques"/>
        </nav>
        <div style={{padding:12,borderTop:"1px solid #f1f5f9"}}>
          <NavBtn id="settings" ic="⚙️" label="Paramètres"/>
          <button onClick={onExit} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"9px 12px",borderRadius:10,border:"none",background:"none",color:"#ef4444",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'Sora',sans-serif"}}>
            🚪 Retour boutique
          </button>
        </div>
      </aside>

      {/* Content */}
      <main style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column"}}>
        <div style={{background:"#fff",borderBottom:"1px solid #f1f5f9",padding:"12px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10}}>
          <div>
            <h1 style={{fontWeight:900,fontSize:15,color:"#0f172a"}}>{TABS[tab]}</h1>
            <p style={{fontSize:10,color:"#94a3b8"}}>Bonjour, Administrateur 👋</p>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:99,fontSize:10,fontWeight:700,
              background:odooStatus==="ok"?"#d1fae5":odooStatus==="error"?"#fee2e2":"#fef3c7",
              color:odooStatus==="ok"?"#047857":odooStatus==="error"?"#dc2626":"#b45309"}}>
              <span style={{width:6,height:6,borderRadius:"50%",background:"currentColor",display:"inline-block"}}/>
              {odooStatus==="ok"?"🔗 Odoo connecté":odooStatus==="error"?"⚠ Odoo hors ligne":"⏳ Vérification..."}
            </div>
            <div style={{position:"relative",cursor:"pointer",fontSize:18}}>🔔<span style={{position:"absolute",top:0,right:0,width:7,height:7,borderRadius:"50%",background:"#ef4444",border:"1px solid #fff"}}/></div>
            <div style={{display:"flex",alignItems:"center",gap:6,background:"#eff6ff",borderRadius:10,padding:"6px 10px"}}>
              <div style={{width:24,height:24,borderRadius:"50%",background:BLUE,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:10,fontWeight:900}}>A</div>
              <span style={{fontSize:11,fontWeight:700,color:"#334155"}}>Admin</span>
            </div>
          </div>
        </div>

        <div style={{padding:24,flex:1}}>
          {/* Dashboard */}
          {tab==="dash"&&(
            <div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:20}}>
                {stats.map((s,i)=>(
                  <div key={i} style={{background:"#fff",borderRadius:16,padding:16,border:"1px solid #f1f5f9",boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                      <div style={{width:36,height:36,borderRadius:10,background:s.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{s.ic}</div>
                      <span style={{fontSize:10,fontWeight:800,color:"#059669",background:"#ecfdf5",padding:"2px 7px",borderRadius:99,display:"flex",alignItems:"center",gap:2}}>↑{s.ch}</span>
                    </div>
                    <p style={{fontSize:17,fontWeight:900,color:"#0f172a"}}>{s.v}</p>
                    <p style={{fontSize:10,color:"#94a3b8",marginTop:2}}>{s.l}</p>
                  </div>
                ))}
              </div>

              <div style={{background:"#fff",borderRadius:16,border:"1px solid #f1f5f9",overflow:"hidden",marginBottom:16}}>
                <div style={{padding:"14px 20px",borderBottom:"1px solid #f1f5f9",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <p style={{fontWeight:800,fontSize:13}}>Commandes récentes</p>
                  <button onClick={()=>setTab("orders")} style={{fontSize:11,fontWeight:700,color:BLUE,border:"none",background:"none",cursor:"pointer"}}>Voir toutes</button>
                </div>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                  <thead><tr style={{background:"#f8fafc"}}>{["Réf.","Client","Ville","Total","Statut"].map(h=><th key={h} style={{textAlign:"left",padding:"10px 16px",fontWeight:700,color:"#94a3b8",textTransform:"uppercase",fontSize:10,letterSpacing:.05}}>{h}</th>)}</tr></thead>
                  <tbody>
                    {orders.map(o=>(
                      <tr key={o.id} style={{borderTop:"1px solid #f8fafc"}}>
                        <td style={{padding:"10px 16px",fontWeight:800,color:"#334155"}}>{o.id}</td>
                        <td style={{padding:"10px 16px",fontWeight:600}}>{o.customer}</td>
                        <td style={{padding:"10px 16px",color:"#94a3b8"}}>{o.city}</td>
                        <td style={{padding:"10px 16px",fontWeight:800,color:BLUE}}>{fmt(o.total)}</td>
                        <td style={{padding:"10px 16px"}}><StatusBadge s={o.status}/></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>

              <div style={{background:"#fff",borderRadius:16,border:"1px solid #f1f5f9",padding:20}}>
                <p style={{fontWeight:800,fontSize:13,marginBottom:14}}>Top Produits</p>
                {prods.slice(0,5).map((p,i)=>(
                  <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                    <span style={{fontSize:10,fontWeight:900,color:"#94a3b8",width:16}}>#{i+1}</span>
                    <SafeImg src={p.img} alt={p.name} style={{width:32,height:32,borderRadius:8,objectFit:"cover"}}/>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{fontSize:11,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</p>
                      <p style={{fontSize:10,color:"#94a3b8"}}>{p.rev} ventes · {p.cat}</p>
                    </div>
                    <p style={{fontSize:11,fontWeight:800,color:BLUE,flexShrink:0}}>{fmt(p.price)}</p>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Products */}
          {tab==="products"&&(
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                <p style={{fontSize:11,color:"#94a3b8"}}>{prods.length} produit(s)</p>
                <button onClick={()=>setShowAdd(!showAdd)} style={{padding:"8px 16px",borderRadius:10,border:"none",background:showAdd?"#f1f5f9":grad,color:showAdd?"#475569":"#fff",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'Sora',sans-serif"}}>
                  {showAdd?"✕ Annuler":"+ Nouveau produit"}
                </button>
              </div>
              {showAdd&&(
                <div style={{background:"#fff",borderRadius:16,border:"1px solid #f1f5f9",padding:20,marginBottom:16}}>
                  <p style={{fontWeight:800,fontSize:13,marginBottom:14}}>Nouveau produit</p>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
                    {[["name","Nom *","Ex: Samsung A54"],["price","Prix FCFA *","250000"],["orig","Prix barré","280000"],["stock","Stock","50"]].map(([k,l,ph])=>(
                      <div key={k}>
                        <label style={{display:"block",fontSize:10,fontWeight:700,color:"#94a3b8",marginBottom:4,textTransform:"uppercase"}}>{l}</label>
                        <input value={np[k]} onChange={e=>{setNp(p=>({...p,[k]:e.target.value}));setNpErr(er=>({...er,[k]:""}));}} placeholder={ph}
                          style={{width:"100%",padding:"8px 10px",borderRadius:8,border:`1px solid ${npErr[k]?"#fca5a5":"#e2e8f0"}`,fontSize:12,fontFamily:"'Sora',sans-serif"}}/>
                        {npErr[k]&&<p style={{fontSize:10,color:"#ef4444",marginTop:2}}>{npErr[k]}</p>}
                      </div>
                    ))}
                  </div>
                  <div style={{marginBottom:12}}>
                    <label style={{display:"block",fontSize:10,fontWeight:700,color:"#94a3b8",marginBottom:4,textTransform:"uppercase"}}>Catégorie</label>
                    <select value={np.cat} onChange={e=>setNp(p=>({...p,cat:e.target.value}))} style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid #e2e8f0",fontSize:12,fontFamily:"'Sora',sans-serif",background:"#fff"}}>
                      {CATS.map(c=><option key={c.id}>{c.name}</option>)}
                    </select>
                  </div>
                  <div style={{marginBottom:14}}>
                    <label style={{display:"block",fontSize:10,fontWeight:700,color:"#94a3b8",marginBottom:4,textTransform:"uppercase"}}>Description</label>
                    <textarea value={np.desc} onChange={e=>setNp(p=>({...p,desc:e.target.value}))} rows={2} placeholder="Description..." style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid #e2e8f0",fontSize:12,fontFamily:"'Sora',sans-serif",resize:"none"}}/>
                  </div>
                  <div style={{border:"2px dashed #e2e8f0",borderRadius:12,padding:"16px",textAlign:"center",color:"#94a3b8",fontSize:11,marginBottom:14,cursor:"pointer"}}>
                    📤 Cliquer pour ajouter une image
                  </div>
                  <div style={{display:"flex",gap:10}}>
                    <button onClick={()=>{setShowAdd(false);setNpErr({});}} style={{padding:"8px 16px",borderRadius:10,border:"1px solid #e2e8f0",background:"none",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"'Sora',sans-serif"}}>Annuler</button>
                    <button onClick={saveProduct} style={{flex:1,padding:"10px",borderRadius:10,border:"none",background:grad,color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'Sora',sans-serif"}}>Enregistrer le produit</button>
                  </div>
                </div>
              )}
              <div style={{background:"#fff",borderRadius:16,border:"1px solid #f1f5f9",overflow:"hidden"}}>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                    <thead><tr style={{background:"#f8fafc"}}>{["Produit","Catégorie","Prix","Stock","Note","Actions"].map(h=><th key={h} style={{textAlign:"left",padding:"10px 14px",fontWeight:700,color:"#94a3b8",textTransform:"uppercase",fontSize:10}}>{h}</th>)}</tr></thead>
                    <tbody>
                      {prods.map(p=>(
                        <tr key={p.id} style={{borderTop:"1px solid #f8fafc"}}>
                          <td style={{padding:"10px 14px"}}>
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <SafeImg src={p.img} alt="" style={{width:30,height:30,borderRadius:8,objectFit:"cover",flexShrink:0}}/>
                              <span style={{fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:180}}>{p.name}</span>
                            </div>
                          </td>
                          <td style={{padding:"10px 14px",color:"#94a3b8"}}>{p.cat}</td>
                          <td style={{padding:"10px 14px",fontWeight:800,color:BLUE}}>{fmt(p.price)}</td>
                          <td style={{padding:"10px 14px"}}>
                            <span style={{padding:"2px 8px",borderRadius:99,fontSize:10,fontWeight:700,
                              background:(p.stock||0)>10?"#d1fae5":(p.stock||0)>0?"#fef3c7":"#fee2e2",
                              color:(p.stock||0)>10?"#047857":(p.stock||0)>0?"#b45309":"#dc2626"}}>
                              {p.stock||0} unités
                            </span>
                          </td>
                          <td style={{padding:"10px 14px",fontWeight:700}}>{p.rating||"—"}</td>
                          <td style={{padding:"10px 14px"}}>
                            <div style={{display:"flex",gap:4}}>
                              <button style={{width:26,height:26,borderRadius:8,border:"none",background:"#eff6ff",cursor:"pointer",fontSize:12}}>👁</button>
                              <button style={{width:26,height:26,borderRadius:8,border:"none",background:"#f8fafc",cursor:"pointer",fontSize:12}}>✏️</button>
                              <button onClick={()=>{setProds(pr=>pr.filter(x=>x.id!==p.id));push("Produit supprimé","warn");}} style={{width:26,height:26,borderRadius:8,border:"none",background:"#fef2f2",cursor:"pointer",fontSize:12}}>🗑</button>
                            </div>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          )}

          {/* Orders */}
          {tab==="orders"&&(
            <div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
                {[["En attente","#fffbeb","#b45309"],["En transit","#dbeafe","#1d4ed8"],["Livré","#d1fae5","#047857"],["Annulé","#fee2e2","#dc2626"]].map(([s,bg,c])=>(
                  <div key={s} style={{background:bg,borderRadius:12,padding:"10px 14px",textAlign:"center"}}>
                    <p style={{fontSize:20,fontWeight:900,color:c}}>{orders.filter(o=>o.status===s).length}</p>
                    <p style={{fontSize:10,fontWeight:600,color:c}}>{s}</p>
                  </div>
                ))}
              </div>
              <div style={{background:"#fff",borderRadius:16,border:"1px solid #f1f5f9",overflow:"hidden"}}>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                    <thead><tr style={{background:"#f8fafc"}}>{["Réf.","Client","Date","Ville","Articles","Total","Statut","Changer"].map(h=><th key={h} style={{textAlign:"left",padding:"10px 14px",fontWeight:700,color:"#94a3b8",textTransform:"uppercase",fontSize:10}}>{h}</th>)}</tr></thead>
                    <tbody>
                      {orders.map(o=>(
                        <tr key={o.id} style={{borderTop:"1px solid #f8fafc"}}>
                          <td style={{padding:"10px 14px",fontWeight:800,color:"#334155"}}>{o.id}</td>
                          <td style={{padding:"10px 14px",fontWeight:600}}>{o.customer}</td>
                          <td style={{padding:"10px 14px",color:"#94a3b8"}}>{o.date}</td>
                          <td style={{padding:"10px 14px",color:"#94a3b8"}}>{o.city}</td>
                          <td style={{padding:"10px 14px",color:"#94a3b8"}}>{o.items}</td>
                          <td style={{padding:"10px 14px",fontWeight:800,color:BLUE}}>{fmt(o.total)}</td>
                          <td style={{padding:"10px 14px"}}><StatusBadge s={o.status}/></td>
                          <td style={{padding:"10px 14px"}}>
                            <select value={o.status} onChange={e=>{changeOrderStatus(o.id,o.odooId||o.id,e.target.value);}}
                              style={{padding:"5px 8px",borderRadius:8,border:"1px solid #e2e8f0",fontSize:11,fontFamily:"'Sora',sans-serif",background:"#fff",cursor:"pointer"}}>
                              {["En attente","En transit","Livré","Annulé"].map(s=><option key={s}>{s}</option>)}
                            </select>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          )}

          {["customers","analytics","settings"].includes(tab)&&(
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:200,color:"#94a3b8",gap:8,textAlign:"center"}}>
              <span style={{fontSize:40,opacity:.4}}>📊</span>
              <p style={{fontWeight:700,color:"#64748b",fontSize:13}}>Module en développement</p>
              <p style={{fontSize:11}}>Bientôt disponible !</p>
            </div>
          )}
        </div>
      </main>
    </div>
  );
}

// ── FOOTER ──
function Footer({go}){
  return(
    <footer style={{background:"#0a1929",color:"#fff",marginTop:40}}>
      <div style={{maxWidth:1280,margin:"0 auto",padding:"32px 16px"}}>
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",gap:24,marginBottom:28}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
              <div style={{width:30,height:30,borderRadius:9,background:grad,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>🛍</div>
              <span style={{fontSize:17,fontWeight:900}}>Kumpax<span style={{color:"#fbbf24"}}>.</span></span>
            </div>
            <p style={{color:"#64748b",fontSize:11,lineHeight:1.7,marginBottom:12}}>Le shopping premium au Sénégal. Produits authentiques, livraison rapide.</p>
            <div style={{display:"flex",gap:6}}>
              {["📘","📸","🐦"].map((ic,i)=><button key={i} style={{width:30,height:30,borderRadius:8,background:"rgba(255,255,255,.08)",border:"none",cursor:"pointer",fontSize:14}}>{ic}</button>)}
            </div>
          </div>
          {[{t:"Boutique",items:["Smartphones","Vêtements","Électroménager","TV & Audio"]},{t:"Service",items:["À propos","Contact","FAQ","Retours"]},{t:"Contact",items:["+221 77 000 00 00","support@kumpax.sn","Dakar, Sénégal","Lun–Sam 8h–20h"]}].map((col,i)=>(
            <div key={i}>
              <p style={{fontSize:10,fontWeight:800,textTransform:"uppercase",letterSpacing:.1,color:"#475569",marginBottom:10}}>{col.t}</p>
              {col.items.map(l=><p key={l} onClick={()=>go("catalog")} style={{fontSize:11,color:"#64748b",marginBottom:6,cursor:"pointer"}}
                onMouseEnter={e=>e.currentTarget.style.color="#fbbf24"}
                onMouseLeave={e=>e.currentTarget.style.color="#64748b"}>{l}</p>)}
            </div>
          ))}
        </div>
        <div style={{borderTop:"1px solid rgba(255,255,255,.08)",paddingTop:16,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
          <p style={{fontSize:10,color:"#475569"}}>© 2024 Kumpax Store. Tous droits réservés. 🇸🇳</p>
          <div style={{display:"flex",gap:6}}>
            {["Wave","Orange Money","Free Money","Cash"].map(m=><span key={m} style={{fontSize:9,background:"rgba(255,255,255,.08)",padding:"3px 8px",borderRadius:99,color:"#64748b"}}>{m}</span>)}
          </div>
        </div>
      </div>
    </footer>
  );
}

// ── APP ──
function App(){
  const[page,setPage]=useState("home");
  const[prod,setProd]=useState(null);
  const[admin,setAdmin]=useState(false);
  const[cartOpen,setCartOpen]=useState(false);
  const[q,setQ]=useState("");
  const[initCat,setInitCat]=useState("Tous");

  // ── État global produits & catégories (chargés une seule fois depuis Odoo/mock) ──
  const[allProducts,setAllProducts]=useState(PRODS);
  const[categories, setCategories]=useState(CATS);
  const[dataLoading,setDataLoading]=useState(false);

  useEffect(()=>{
    if(!USE_ODOO) return; // en mode démo, on garde les données mock
    (async()=>{
      setDataLoading(true);
      try{
        const[pRes,cRes]=await Promise.all([api.getProducts(),api.getCategories()]);
        if(pRes.success&&pRes.data?.length) setAllProducts(pRes.data);
        if(cRes.success&&cRes.data?.length) setCategories(cRes.data);
      }catch(e){ console.warn("Chargement Odoo échoué, données mock utilisées",e.message); }
      finally{ setDataLoading(false); }
    })();
  },[]);

  const go=useCallback((target,opts={})=>{
    if(opts.product)setProd(opts.product);
    if(opts.cat)setInitCat(opts.cat);
    setPage(target);
    window.scrollTo({top:0,behavior:"smooth"});
  },[]);

  if(admin)return(
    <CartProvider><WishProvider><ToastProvider>
      <Admin onExit={()=>setAdmin(false)}/>
    </ToastProvider></WishProvider></CartProvider>
  );

  return(
    <CartProvider><WishProvider><ToastProvider>
      <div style={{minHeight:"100vh",background:"#f8fafc"}}>
        <Navbar go={go} setCartOpen={setCartOpen} q={q} setQ={setQ} categories={categories}/>
        <CartDrawer open={cartOpen} onClose={()=>setCartOpen(false)} go={go}/>
        {/* Bannière mode démo */}
        {!USE_ODOO&&(
          <div style={{background:"#fef3c7",borderBottom:"1px solid #fde68a",padding:"7px 16px",display:"flex",alignItems:"center",justifyContent:"center",gap:8,fontSize:11,color:"#92400e",fontWeight:600}}>
            ⚠️ Mode démo — données simulées. Pour connecter Odoo, configurez <code style={{background:"rgba(0,0,0,.07)",padding:"1px 5px",borderRadius:4}}>window.KUMPAX_USE_ODOO=true</code> et <code style={{background:"rgba(0,0,0,.07)",padding:"1px 5px",borderRadius:4}}>window.KUMPAX_API_URL</code>
          </div>
        )}
        <main className="fade-in" key={page}>
          {page==="home"    &&<Home go={go} products={allProducts} categories={categories} loading={dataLoading}/>}
          {page==="catalog" &&<Catalog go={go} initCat={initCat} q={q} products={allProducts} categories={categories}/>}
          {page==="product" &&prod&&<ProductPage p={prod} go={go} allProducts={allProducts}/>}
          {page==="checkout"&&<Checkout go={go}/>}
          {page==="wishlist"&&<Wishlist go={go} allProducts={allProducts}/>}
          {page==="account" &&<Account go={go}/>}
        </main>
        <Footer go={go}/>
        <button onClick={()=>setAdmin(true)} title="Panneau Admin" style={{position:"fixed",bottom:20,right:20,width:42,height:42,borderRadius:"50%",background:"#1e293b",border:"none",color:"#fff",cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 16px rgba(0,0,0,.25)",zIndex:30}}>
          ⚙️
        </button>
      </div>
    </ToastProvider></WishProvider></CartProvider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
